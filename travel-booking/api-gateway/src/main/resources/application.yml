server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5

zuul:
  routes:
    flight-service:
      path: /flights/**
      service-id: flight-service
      strip-prefix: false
    hotel-service:
      path: /hotels/**
      service-id: hotel-service
      strip-prefix: false
    car-rental-service:
      path: /cars/**
      service-id: car-rental-service
      strip-prefix: false
  host:
    connect-timeout-millis: 10000
    socket-timeout-millis: 10000

ribbon:
  ReadTimeout: 10000
  ConnectTimeout: 10000

logging:
  level:
    com.travel: DEBUG
