# Heroku profile — overrides default application.yml
# Eureka-based routing does not work on Heroku (dynos register internal addresses).
# Static URLs are used instead so the gateway can reach each service via its public URL.

eureka:
  client:
    enabled: false
    fetch-registry: false
    register-with-eureka: false

ribbon:
  eureka:
    enabled: false

zuul:
  routes:
    flight-service:
      path: /flights/**
      url: https://flight-service.herokuapp.com
      strip-prefix: false
    hotel-service:
      path: /hotels/**
      url: https://hotel-service.herokuapp.com
      strip-prefix: false
    car-rental-service:
      path: /cars/**
      url: https://car-rental-service.herokuapp.com
      strip-prefix: false
  host:
    connect-timeout-millis: 15000
    socket-timeout-millis: 15000
