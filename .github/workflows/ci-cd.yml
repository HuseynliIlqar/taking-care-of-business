name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build
        working-directory: travel-booking
        run: mvn clean package -DskipTests

      - name: Run tests + JaCoCo coverage
        working-directory: travel-booking
        run: mvn test jacoco:report

      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: travel-booking
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # JOB 2 — Docker Build
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JARs
        working-directory: travel-booking
        run: mvn clean package -DskipTests

      - name: Build Docker images
        working-directory: travel-booking
        run: |
          docker build -t travel-booking/discovery-service:${{ github.sha }}  ./discovery-service
          docker build -t travel-booking/api-gateway:${{ github.sha }}         ./api-gateway
          docker build -t travel-booking/flight-service:${{ github.sha }}      ./flight-service
          docker build -t travel-booking/hotel-service:${{ github.sha }}       ./hotel-service
          docker build -t travel-booking/car-rental-service:${{ github.sha }}  ./car-rental-service

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy to AWS EC2
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JARs
        working-directory: travel-booking
        run: mvn clean package -DskipTests

      - name: Copy project to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "travel-booking/"
          target: "/home/ubuntu/app"
          rm: false

      - name: Start services on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app/travel-booking

            # Stop existing containers
            docker-compose down --remove-orphans

            # Build images and start all 5 services
            docker-compose up --build -d

            # Wait for services to start
            sleep 10

            # Show running containers
            docker ps
